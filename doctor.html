<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>MediFlow | Doctor Management</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Segoe UI",sans-serif;
}

body{
background:#f4f7f6;
padding:40px;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.header h2{
color:#00695c;
}

/* FORM */

.form-grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-bottom:25px;

}

.form-grid input,
.form-grid select{

padding:12px;
border-radius:8px;
border:1px solid #ccc;

}

.btn-save{

background:#009688;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
font-weight:600;

}

/* SEARCH */

.search{

margin-bottom:20px;
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;

}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:15px;
overflow:hidden;
}

th{
background:#f1f1f1;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #eee;
}

.badge{

padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:bold;

}

.available{
background:#dcfce7;
color:#166534;
}

.leave{
background:#fee2e2;
color:#991b1b;
}

.back-btn{

background:#004d40;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;

}

</style>

</head>

<body>

<div class="header">

<h2>👨‍⚕️ Doctor Management</h2>

<button class="back-btn"
onclick="window.location.href='index.html'">

← Back to Dashboard

</button>

</div>


<input id="searchDoctor"
class="search"
onkeyup="filterDoctors()"
placeholder="🔍 Search Doctor by Name or ID">


<div class="form-grid">

<input id="dname" placeholder="Doctor Name">

<select id="dspecialization">
<option value="">Specialization</option>
<option>Cardiologist</option>
<option>Neurologist</option>
<option>Orthopedic</option>
<option>General Physician</option>
<option>Pediatrician</option>
</select>

<input id="dexperience"
placeholder="Experience (Years)">

<select id="dstatus">
<option>Available</option>
<option>On Leave</option>
</select>

<button onclick="addDoctor()" class="btn-save">
Add Doctor
</button>

</div>


<table>

<thead>

<tr>
<th>ID</th>
<th>Name</th>
<th>Specialization</th>
<th>Experience</th>
<th>Status</th>
<th>Actions</th>
</tr>

</thead>

<tbody id="doctorTable"></tbody>

</table>



<script>

/* STORAGE */

let doctors = JSON.parse(localStorage.getItem("doctors")) || [];


/* ADD DOCTOR */

function addDoctor(){

if(!dname.value || !dspecialization.value)
return alert("Fill Doctor Name and Specialization");

doctors.push({

id:"DOC-"+Math.floor(1000+Math.random()*9000),
name:dname.value,
specialization:dspecialization.value,
experience:dexperience.value,
status:dstatus.value

});

saveDoctors();

dname.value="";
dexperience.value="";

}


/* DELETE */

function deleteDoctor(index){

if(confirm("Delete doctor record?")){

doctors.splice(index,1);
saveDoctors();

}

}


/* SAVE */

function saveDoctors(){

localStorage.setItem("doctors",
JSON.stringify(doctors));

renderDoctors(doctors);

}


/* DISPLAY */

function renderDoctors(list){

let table=document.getElementById("doctorTable");

table.innerHTML="";

list.forEach((d,i)=>{

let statusClass =
d.status==="Available" ? "available" : "leave";

table.innerHTML+=`

<tr>

<td style="font-weight:bold;color:#009688">${d.id}</td>

<td>${d.name}</td>

<td>${d.specialization}</td>

<td>${d.experience} yrs</td>

<td><span class="badge ${statusClass}">${d.status}</span></td>

<td>

<button onclick="deleteDoctor(${i})"
style="border:none;background:none;color:red;cursor:pointer">

<i class="fa-solid fa-trash"></i>

</button>

</td>

</tr>

`;

});

}


/* SEARCH */

function filterDoctors(){

let query=document
.getElementById("searchDoctor")
.value.toLowerCase();

let filtered=doctors.filter(d=>

d.name.toLowerCase().includes(query) ||
d.id.toLowerCase().includes(query)

);

renderDoctors(filtered);

}


/* INIT */

renderDoctors(doctors);

</script>

</body>
</html>
